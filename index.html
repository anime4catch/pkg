<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Anime Catch Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #C1973E;
            --gold-gradient: linear-gradient(135deg, #C1973E, #e0b75c);
            --bg-dark: #0a0a0a;
            --card-dark: #1c1c1c;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 95vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .card {
            background: var(--card-dark);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: inline-block;
            max-width: 450px;
            width: 100%;
            border-top: 5px solid var(--primary-gold);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(193, 151, 62, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-img {
            width: 130px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(193, 151, 62, 0.4));
            transition: transform 0.3s ease;
        }
        
        .logo-img:hover { 
            transform: scale(1.05); 
        }

        h1 {
            color: var(--primary-gold);
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        p { 
            font-size: 1.1rem; 
            line-height: 1.6; 
            opacity: 0.9; 
            color: #e0e0e0; 
        }
        
        .sub-text { 
            font-size: 0.95rem; 
            opacity: 0.7; 
            margin-top: 10px; 
        }

        .btn {
            background: var(--gold-gradient);
            color: #000000;
            padding: 16px 35px;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            margin-top: 35px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 5px 20px rgba(193, 151, 62, 0.5);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(193, 151, 62, 0.7);
            background: transparent;
            border-color: var(--primary-gold);
            color: var(--primary-gold);
        }

        .loader {
            border: 3px solid rgba(193, 151, 62, 0.1);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin: 30px auto 10px;
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="copilot_image_1775508360718.jpeg" alt="Anime Catch Logo" class="logo-img" onerror="this.style.display='none'">

        <h1>Welcome to the Anime World!</h1>
        <p>Your authentication request has been received.</p>
        <p class="sub-text">You will now be redirected to the app to continue your journey...</p>

        <div class="loader"></div>

        <a id="app-link" href="#" class="btn">Proceed to App Manually</a>
    </div>

    <script>
        const hash = window.location.hash;

        if(hash && hash.includes("access_token=")) {
            const appLink = "animecatch://login" + hash;
            document.getElementById('app-link').href = appLink;

            setTimeout(() => {
                 window.location.href = appLink;
            }, 1500);
        } else {
             document.querySelector('.card h1').innerText = "Authentication Error";
             document.querySelector('.card p').innerText = "Sorry, no login credentials were found.";
             document.querySelector('.sub-text').style.display = 'none';
             document.querySelector('.loader').style.display = 'none';
             document.querySelector('.btn').style.display = 'none';
             document.querySelector('.logo-img').style.filter = 'grayscale(100%) opacity(0.5)';
        }
    </script>
</body>
</html>
